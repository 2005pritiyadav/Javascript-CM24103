<!<!DOCTYPE html>
<html>
<head>
    <title>Smart Location Selector</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 25px;
            border-radius: 15px;
            width: 320px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #5a67d8;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #434190;
        }

        #dashboard {
            display: none;
        }

        .card {
            margin-top: 15px;
            padding: 15px;
            border-radius: 10px;
            background: #f1f5ff;
            display: none;
        }

        .highlight {
            color: #5a67d8;
            font-weight: bold;
        }
    </style>

</head>
<body>

<!-- LOGIN -->
<div class="box" id="loginBox">
    <h2>Login</h2>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button onclick="loginUser()">Login</button>
</div>

<!-- DASHBOARD -->
<div class="box" id="dashboard">
    <h2>Select Location</h2>

    <select id="state">
        <option value="">Select State</option>
        <option value="Maharashtra">Maharashtra</option>
        <option value="Gujarat">Gujarat</option>
        <option value="Karnataka">Karnataka</option>
    </select>

    <select id="city">
        <option value="">Select City</option>
    </select>

    <!-- VISUALIZATION CARD -->
    <div class="card" id="resultCard">
        📍 You selected:<br>
        State: <span class="highlight" id="showState"></span><br>
        City: <span class="highlight" id="showCity"></span>
    </div>

    <button onclick="logout()">Logout</button>
</div>

<script>
    const data = {
        Maharashtra: ["Pune", "Mumbai", "Nagpur"],
        Gujarat: ["Ahmedabad", "Surat", "Vadodara"],
        Karnataka: ["Bangalore", "Mysore", "Mangalore"]
    };

    document.addEventListener("DOMContentLoaded", function () {
        const state = document.getElementById("state");
        const city = document.getElementById("city");

        state.addEventListener("change", function () {
            city.innerHTML = '<option value="">Select City</option>';

            if (data[this.value]) {
                data[this.value].forEach(function (c) {
                    let option = document.createElement("option");
                    option.value = c;
                    option.textContent = c;
                    city.appendChild(option);
                });
            }

            updateCard();
        });

        city.addEventListener("change", updateCard);
    });

    function updateCard() {
        const state = document.getElementById("state").value;
        const city = document.getElementById("city").value;

        if (state && city) {
            document.getElementById("resultCard").style.display = "block";
            document.getElementById("showState").textContent = state;
            document.getElementById("showCity").textContent = city;
        }
    }

    function loginUser() {
        let user = document.getElementById("username").value.trim();
        let pass = document.getElementById("password").value.trim();

        if (user === "admin" && pass === "1234") {
            document.getElementById("loginBox").style.display = "none";
            document.getElementById("dashboard").style.display = "block";
        } else {
            alert("Invalid Login");
        }
    }

    function logout() {
        document.getElementById("dashboard").style.display = "none";
        document.getElementById("loginBox").style.display = "block";
    }
</script>

</body>
</html>
